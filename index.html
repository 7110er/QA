<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYGH 疾病全人照護諮詢</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body class="bg-gray-100 font-sans">
  <div class="container mx-auto p-6 max-w-3xl">
    <h1 class="text-3xl font-bold text-center mb-4">TYGH 疾病全人照護諮詢</h1>
    <h3 id="subtitle" class="text-lg text-center mb-6">關於您的疾病照護，對整體治療、生活、追蹤或家人照顧，有沒有哪裡讓您擔心、想多了解的地方呢？</h3>
    <div id="message" class="mt-4 text-center text-lg"></div>

    <form id="consultationForm" class="bg-white p-6 rounded-lg shadow-md">
      <!-- 病歷號碼 和 病人來源 -->
      <div class="mb-4 flex space-x-4">
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="patientId">病歷號碼</label>
          <input type="text" id="patientId" class="w-full p-2 border rounded-lg text-lg" placeholder="輸入病歷號碼">
        </div>
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="patientSource">病人來源</label>
          <select id="patientSource" class="w-full p-2 border rounded-lg text-lg">
            <option value="">請選擇</option>
            <option value="門診">門診</option>
            <option value="住院">住院</option>
            <option value="急診">急診</option>
            <option value="新屋分院">新屋分院</option>
            <option value="社區">社區</option>
            <option value="居家">居家</option>
          </select>
        </div>
      </div>

      <!-- 疾病照護類型 和 搜尋框 -->
      <div class="mb-4 flex space-x-4">
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="issueType">疾病照護類型</label>
          <select id="issueType" class="w-full p-2 border rounded-lg text-lg">
            <option value="">請選擇</option>
          </select>
        </div>
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="diseaseSearch">搜尋疾病</label>
          <input type="text" id="diseaseSearch" class="w-full p-2 border rounded-lg text-lg" placeholder="輸入疾病名稱">
        </div>
      </div>

      <!-- 問題分類 和 搜尋框 -->
      <div class="mb-4 flex space-x-4">
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="category">問題分類</label>
          <select id="category" class="w-full p-2 border rounded-lg text-lg">
            <option value="">請選擇</option>
          </select>
        </div>
        <div class="w-1/2">
          <label class="block text-lg font-medium mb-2" for="categorySearch">搜尋問題</label>
          <input type="text" id="categorySearch" class="w-full p-2 border rounded-lg text-lg" placeholder="輸入關鍵字">
        </div>
      </div>

      <!-- 諮詢問題 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2" for="consultationIssue">諮詢問題</label>
        <select id="consultationIssue" class="w-full p-2 border rounded-lg text-lg">
          <option value="">請選擇問題</option>
        </select>
      </div>

      <!-- 醫療人員回應 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2" for="staffResponse">醫療人員回應 *</label>
        <textarea id="staffResponse" class="w-full p-2 border rounded-lg text-lg" rows="4" required></textarea>
        <div class="mt-2">
          <label for="fontSizeSlider" class="text-lg">調整字體大小: <span id="fontSizeValue">16</span>px</label>
          <input type="range" id="fontSizeSlider" min="16" max="32" value="16" class="w-full">
        </div>
      </div>

      <!-- 附加檔案區塊 -->
      <div id="attachmentSection" class="mb-4"></div>

      <!-- 發現問題（可複選） -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2">發現問題（可複選）</label>
        <div class="space-y-2">
          <div>
            <input type="checkbox" id="healthIssue" class="mr-2" onchange="toggleSubCategories('health')">
            <label for="healthIssue">1. 身體健康與疾病問題</label>
            <div id="healthSub" class="ml-6 hidden space-y-1">
              <label><input type="checkbox" name="issues" value="疾病控制不佳"> 疾病控制不佳（血壓、血糖未穩、症狀反覆）</label><br>
              <label><input type="checkbox" name="issues" value="功能障礙"> 功能障礙或技術困難（吞嚥、視力、手部、器材操作困難）</label><br>
              <label><input type="checkbox" name="issues" value="藥物問題"> 藥物相關問題（含配合度）：不良反應、交互作用、重複用藥、未依醫囑</label>
            </div>
          </div>
          <div>
            <input type="checkbox" id="emotionIssue" class="mr-2" onchange="toggleSubCategories('emotion')">
            <label for="emotionIssue">2. 情緒與認知問題</label>
            <div id="emotionSub" class="ml-6 hidden space-y-1">
              <label><input type="checkbox" name="issues" value="情緒困擾"> 情緒困擾（焦慮、憂鬱、抗拒治療）</label><br>
              <label><input type="checkbox" name="issues" value="理解困難"> 理解困難（語言、識字、認知障礙）</label><br>
              <label><input type="checkbox" name="issues" value="衛教不足"> 衛教不足或錯誤觀念（偏方、資訊誤解、治療迷思）</label>
            </div>
          </div>
          <div>
            <input type="checkbox" id="socialIssue" class="mr-2" onchange="toggleSubCategories('social')">
            <label for="socialIssue">3. 社會支持與生活環境問題</label>
            <div id="socialSub" class="ml-6 hidden space-y-1">
              <label><input type="checkbox" name="issues" value="支持不足"> 家庭/機構支持不足（無照顧者、照護失當）</label><br>
              <label><input type="checkbox" name="issues" value="經濟壓力"> 經濟壓力或藥物取得困難（無力負擔、自費、交通障礙）</label><br>
              <label><input type="checkbox" name="issues" value="生活習慣"> 生活習慣或環境風險（飲酒、抽菸、作息混亂、居住安全不良）</label>
            </div>
          </div>
          <div>
            <input type="checkbox" id="spiritIssue" class="mr-2" onchange="toggleSubCategories('spirit')">
            <label for="spiritIssue">4. 生命意義與靈性需求</label>
            <div id="spiritSub" class="ml-6 hidden space-y-1">
              <label><input type="checkbox" name="issues" value="存在焦慮"> 存在焦慮或價值失落（對疾病、死亡感到迷失或無意義）</label><br>
              <label><input type="checkbox" name="issues" value="宗教需求"> 宗教或靈性需求（需宗教支持、祈禱、靈性對話）</label><br>
              <label><input type="checkbox" name="issues" value="價值觀衝突"> 治療價值觀衝突（與家屬或團隊對末期治療有歧見）</label>
            </div>
          </div>
          <div>
            <input type="checkbox" id="complexIssue" class="mr-2" onchange="toggleSubCategories('complex')">
            <label for="complexIssue">5. 整合照護與複雜需求</label>
            <div id="complexSub" class="ml-6 hidden space-y-1">
              <label><input type="checkbox" name="issues" value="多重共病"> 多重共病或高複雜病況（糖尿病併心衰、高齡衰弱、跌倒風險）</label><br>
              <label><input type="checkbox" name="issues" value="照護協調"> 照護協調困難（跨院轉銜、資訊落差、多職類溝通障礙）</label><br>
              <label><input type="checkbox" name="issues" value="特殊族群"> 特殊族群照護需求（兒科、出院困難、安寧緩和等）</label>
            </div>
          </div>
        </div>
      </div>

      <!-- 跨職類照護需求評估 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2" for="referral">跨職類照護需求評估</label>
        <select id="referral" class="w-full p-2 border rounded-lg text-lg">
          <option value="">請選擇</option>
          <option value="醫師">醫師</option>
          <option value="中醫師">中醫師</option>
          <option value="藥師">藥師</option>
          <option value="護理師">護理師</option>
          <option value="物理治療師">物理治療師</option>
          <option value="職能治療師">職能治療師</option>
          <option value="醫事檢驗師">醫事檢驗師</option>
          <option value="營養師">營養師</option>
          <option value="臨床心理師">臨床心理師</option>
          <option value="呼吸治療師">呼吸治療師</option>
          <option value="語言治療師">語言治療師</option>
          <option value="聽力師">聽力師</option>
        </select>
      </div>

      <!-- 全人照護建議 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2" for="holisticAdvice">全人照護建議</label>
        <textarea id="holisticAdvice" class="w-full p-2 border rounded-lg text-lg" rows="4"></textarea>
      </div>

      <!-- 醫療人員資料 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2">醫療人員資料 *</label>
        <div class="flex space-x-4">
          <input type="text" id="staffId" class="w-1/2 p-2 border rounded-lg text-lg" placeholder="輸入員工編號" required>
          <select id="staffRole" class="w-1/2 p-2 border rounded-lg text-lg" required>
            <option value="">-- 選擇角色 --</option>
            <option value="藥師">藥師</option>
            <option value="護理師">護理師</option>
            <option value="個案管理師">個案管理師</option>
            <option value="營養師">營養師</option>
          </select>
        </div>
      </div>

      <!-- 滿意度評分 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2">滿意度評分（1-10 分）</label>
        <div class="mb-2">
          <label for="rating1" class="text-lg">❶ 我對治療與用藥說明感到滿意（生理照護）: <span id="rating1Value">1</span></label>
          <input type="range" id="rating1" min="1" max="10" value="1" class="w-full">
        </div>
        <div class="mb-2">
          <label for="rating2" class="text-lg">❷ 我在生活與情緒上有被好好關心（心理支持）: <span id="rating2Value">1</span></label>
          <input type="range" id="rating2" min="1" max="10" value="1" class="w-full">
        </div>
        <div>
          <label for="rating3" class="text-lg">❸ 我的家人有被一起照顧與協助（社會支持）: <span id="rating3Value">1</span></label>
          <input type="range" id="rating3" min="1" max="10" value="1" class="w-full">
        </div>
      </div>

      <!-- 病人簽名 -->
      <div class="mb-4">
        <label class="block text-lg font-medium mb-2">病人簽名（可拍照上傳）</label>
        <input type="file" id="signatureUpload" accept="image/*" class="w-full p-2 border rounded-lg text-lg">
        <img id="signaturePreview" class="mt-2 hidden w-full max-w-xs border rounded-lg" alt="簽名預覽">
      </div>

      <!-- 提交按鈕及訊息區域 -->
      <div>
        <button type="submit" class="w-full bg-blue-500 text-white px-4 py-2 rounded-lg text-lg hover:bg-blue-600 transition">提交</button>
        <div id="submitMessage" class="mt-2 text-center text-lg"></div>
      </div>
    </form>
  </div>

  <div class="mt-8 text-center">
    <p class="text-gray-500 text-sm">衛生福利部桃園醫院<br>鈺翔藥師、昕仁藥師 (#2018)<br>網頁設計&資料維護</p>
  </div>

  <script>
    // 設定後端 URL（請替換為您的 Google Apps Script 部署 URL）
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0_4XJd0NOdR9BmHe2im5OXQ5RPFRz2DYY2nlDmD8d-xpSoEQgHT9MPi-MfFhTUJlKOg/exec';

    // 顯示訊息的函數（錯誤用紅色，成功用綠色）
    function showMessage(message, isError = true, elementId = 'message') {
      const messageDiv = document.getElementById(elementId);
      messageDiv.textContent = message;
      messageDiv.classList.remove('text-red-500', 'text-green-500');
      messageDiv.classList.add(isError ? 'text-red-500' : 'text-green-500');
    }

    // 頁面載入時，動態載入疾病照護類型
    window.addEventListener('load', async () => {
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDiseaseTypes`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const issueTypeSelect = document.getElementById('issueType');
        issueTypeSelect.innerHTML = '<option value="">請選擇</option>';
        result.forEach(type => {
          const option = document.createElement('option');
          option.value = type;
          option.textContent = type;
          issueTypeSelect.appendChild(option);
        });
      } catch (error) {
        showMessage(`載入疾病照護類型失敗：${error.message}`);
        console.error('載入疾病照護類型錯誤：', error);
      }
    });

    // 搜尋疾病照護類型
    document.getElementById('diseaseSearch').addEventListener('input', async () => {
      const searchTerm = document.getElementById('diseaseSearch').value.toLowerCase();
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDiseaseTypes`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const issueTypeSelect = document.getElementById('issueType');
        issueTypeSelect.innerHTML = '<option value="">請選擇</option>';
        const filteredTypes = result.filter(type => type.toLowerCase().includes(searchTerm));
        filteredTypes.forEach(type => {
          const option = document.createElement('option');
          option.value = type;
          option.textContent = type;
          issueTypeSelect.appendChild(option);
        });
      } catch (error) {
        showMessage(`搜尋疾病失敗：${error.message}`);
        console.error('搜尋疾病錯誤：', error);
      }
    });

    // 選擇疾病照護類型時，更新副標題並載入問題分類
    document.getElementById('issueType').addEventListener('change', () => {
      const issueType = document.getElementById('issueType').value;
      document.getElementById('subtitle').textContent = `關於您的${issueType || '疾病照護'}，對整體治療、生活、追蹤或家人照顧，有沒有哪裡讓您擔心、想多了解的地方呢？`;
      document.getElementById('category').innerHTML = '<option value="">請選擇</option>';
      document.getElementById('consultationIssue').innerHTML = '<option value="">請選擇問題</option>';
      document.getElementById('staffResponse').value = '';
      document.getElementById('categorySearch').value = '';
      loadCategories();
      loadAttachments();
    });

    // 載入問題分類
    async function loadCategories() {
      const issueType = document.getElementById('issueType').value;
      if (!issueType) return;
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getCategories&issueType=${encodeURIComponent(issueType)}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const categorySelect = document.getElementById('category');
        categorySelect.innerHTML = '<option value="">請選擇</option>';
        result.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat;
          option.textContent = cat;
          categorySelect.appendChild(option);
        });
      } catch (error) {
        showMessage(`載入問題分類失敗：${error.message}`);
        console.error('載入問題分類錯誤：', error);
      }
    }

    // 搜尋問題（問題內容、分類、回應）
    document.getElementById('categorySearch').addEventListener('input', async () => {
      const searchTerm = document.getElementById('categorySearch').value.toLowerCase();
      const issueType = document.getElementById('issueType').value;
      const consultationIssueSelect = document.getElementById('consultationIssue');
      consultationIssueSelect.innerHTML = '<option value="">請選擇問題</option>';
      if (!issueType) return;
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getQuestions&issueType=${encodeURIComponent(issueType)}&category=${encodeURIComponent(document.getElementById('category').value)}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const filteredQuestions = result.filter(q => q.question.toLowerCase().includes(searchTerm));
        filteredQuestions.forEach(q => {
          const option = document.createElement('option');
          option.value = q.question;
          option.textContent = q.question;
          consultationIssueSelect.appendChild(option);
        });
      } catch (error) {
        showMessage(`搜尋問題失敗：${error.message}`);
        console.error('搜尋問題錯誤：', error);
      }
    });

    // 選擇問題分類時，載入問題內容
    document.getElementById('category').addEventListener('change', async () => {
      const issueType = document.getElementById('issueType').value;
      const category = document.getElementById('category').value;
      if (!issueType || !category) return;
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getQuestions&issueType=${encodeURIComponent(issueType)}&category=${encodeURIComponent(category)}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const consultationIssueSelect = document.getElementById('consultationIssue');
        consultationIssueSelect.innerHTML = '<option value="">請選擇問題</option>';
        result.forEach(q => {
          const option = document.createElement('option');
          option.value = q.question;
          option.textContent = q.question;
          consultationIssueSelect.appendChild(option);
        });
      } catch (error) {
        showMessage(`載入問題失敗：${error.message}`);
        console.error('載入問題錯誤：', error);
      }
    });

    // 選擇諮詢問題時，自動填入醫療人員回應並載入附件
    document.getElementById('consultationIssue').addEventListener('change', async () => {
      const issueType = document.getElementById('issueType').value;
      const category = document.getElementById('category').value;
      const question = document.getElementById('consultationIssue').value;
      if (!question) return;
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getResponse&issueType=${encodeURIComponent(issueType)}&category=${encodeURIComponent(category)}&question=${encodeURIComponent(question)}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        document.getElementById('staffResponse').value = result.response || '';
        loadAttachments();
      } catch (error) {
        showMessage(`載入回應失敗：${error.message}`);
        console.error('載入回應錯誤：', error);
      }
    });

    // 載入附件
    async function loadAttachments() {
      const issueType = document.getElementById('issueType').value;
      const question = document.getElementById('consultationIssue').value;
      if (!issueType || !question) {
        document.getElementById('attachmentSection').innerHTML = '';
        return;
      }
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAttachments&issueType=${encodeURIComponent(issueType)}&question=${encodeURIComponent(question)}`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        const attachmentSection = document.getElementById('attachmentSection');
        attachmentSection.innerHTML = '';
        if (result.attachmentD) {
          const linkD = document.createElement('a');
          linkD.href = result.attachmentD;
          linkD.target = '_blank';
          const imgD = document.createElement('img');
          imgD.src = result.attachmentD;
          imgD.className = 'mt-2 max-w-full h-auto border rounded-lg object-contain';
          imgD.onerror = () => {
            linkD.innerHTML = '查看附件D (PDF)';
            linkD.className = 'text-blue-500 underline';
          };
          linkD.appendChild(imgD);
          attachmentSection.appendChild(linkD);
        }
        if (result.attachmentF) {
          const linkF = document.createElement('a');
          linkF.href = result.attachmentF;
          linkF.target = '_blank';
          const imgF = document.createElement('img');
          imgF.src = result.attachmentF;
          imgF.className = 'mt-2 max-w-full h-auto border rounded-lg object-contain';
          imgF.onerror = () => {
            linkF.innerHTML = '查看附件F (PDF)';
            linkF.className = 'text-blue-500 underline';
          };
          linkF.appendChild(imgF);
          attachmentSection.appendChild(linkF);
        }
      } catch (error) {
        showMessage(`載入附件失敗：${error.message}`);
        console.error('載入附件錯誤：', error);
      }
    }

    // 調整醫療人員回應的字體大小
    document.getElementById('fontSizeSlider').addEventListener('input', () => {
      const fontSize = document.getElementById('fontSizeSlider').value;
      document.getElementById('fontSizeValue').textContent = fontSize;
      document.getElementById('staffResponse').style.fontSize = `${fontSize}px`;
    });

    // 簽名圖片預覽
    document.getElementById('signatureUpload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById('signaturePreview');
          preview.src = e.target.result;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // 滿意度滑桿即時更新數字
    ['rating1', 'rating2', 'rating3'].forEach(id => {
      const slider = document.getElementById(id);
      const valueSpan = document.getElementById(`${id}Value`);
      slider.addEventListener('input', () => {
        valueSpan.textContent = slider.value;
      });
    });

    // 切換「發現問題」子選項
    function toggleSubCategories(type) {
      const sub = document.getElementById(`${type}Sub`);
      sub.classList.toggle('hidden');
    }

    // 表單提交
    document.getElementById('consultationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitMessage = document.getElementById('submitMessage');
      submitMessage.textContent = '';

      // 驗證必填欄位
      const requiredFields = [
        { id: 'staffResponse', label: '醫療人員回應' },
        { id: 'staffId', label: '員工編號' },
        { id: 'staffRole', label: '醫療人員角色' }
      ];
      for (const field of requiredFields) {
        if (!document.getElementById(field.id).value) {
          showMessage(`請填寫${field.label}`, true, 'submitMessage');
          return;
        }
      }

      // 收集表單資料
      const selectedIssues = Array.from(document.querySelectorAll('input[name="issues"]:checked')).map(cb => cb.value).join(', ');
      const formData = {
        timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
        patientId: document.getElementById('patientId').value,
        patientSource: document.getElementById('patientSource').value,
        issueType: document.getElementById('issueType').value,
        category: document.getElementById('category').value,
        userInput: document.getElementById('consultationIssue').value,
        staffResponse: document.getElementById('staffResponse').value,
        staffId: document.getElementById('staffId').value,
        staffRole: document.getElementById('staffRole').value,
        referral: document.getElementById('referral').value,
        holisticAdvice: document.getElementById('holisticAdvice').value,
        issues: selectedIssues,
        rating1: document.getElementById('rating1').value,
        rating2: document.getElementById('rating2').value,
        rating3: document.getElementById('rating3').value,
      };

      // 處理簽名上傳
      const signatureFile = document.getElementById('signatureUpload').files[0];
      if (signatureFile) {
        const reader = new FileReader();
        reader.onload = async () => {
          const signatureData = reader.result;
          try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'uploadSignature', dataUrl: signatureData })
            });
            if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
            const result = await response.json();
            if (result.error || !result.success) throw new Error(result.error || '簽名上傳失敗');
            formData.signature = result.url;
            await submitFormData(formData);
          } catch (error) {
            showMessage(`簽名上傳失敗：${error.message}`, true, 'submitMessage');
          }
        };
        reader.readAsDataURL(signatureFile);
      } else {
        formData.signature = '';
        await submitFormData(formData);
      }
    });

    // 提交表單資料到試算表
    async function submitFormData(formData) {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        if (!response.ok) throw new Error(`HTTP 錯誤，狀態碼: ${response.status}`);
        const result = await response.json();
        if (result.error || !result.success) throw new Error(result.error || '儲存失敗');
        showMessage('提交成功！', false, 'submitMessage');
        document.getElementById('consultationForm').reset();
        document.getElementById('signaturePreview').classList.add('hidden');
        document.getElementById('subtitle').textContent = '關於您的疾病照護，對整體治療、生活、追蹤或家人照顧，有沒有哪裡讓您擔心、想多了解的地方呢？';
        document.getElementById('issueType').innerHTML = '<option value="">請選擇</option>';
        document.getElementById('category').innerHTML = '<option value="">請選擇</option>';
        document.getElementById('consultationIssue').innerHTML = '<option value="">請選擇問題</option>';
        document.getElementById('fontSizeSlider').value = 16;
        document.getElementById('fontSizeValue').textContent = 16;
        document.getElementById('staffResponse').style.fontSize = '16px';
        ['rating1', 'rating2', 'rating3'].forEach(id => {
          const slider = document.getElementById(id);
          const valueSpan = document.getElementById(`${id}Value`);
          slider.value = 1;
          valueSpan.textContent = 1;
        });
        document.getElementById('diseaseSearch').value = '';
        document.getElementById('categorySearch').value = '';
        document.querySelectorAll('input[name="issues"]').forEach(cb => cb.checked = false);
        window.dispatchEvent(new Event('load'));
      } catch (error) {
        showMessage(`提交失敗：${error.message}`, true, 'submitMessage');
        console.error('提交錯誤：', error);
      }
    }
  </script>
</body>
</html>
